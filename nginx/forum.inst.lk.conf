server
{
    listen 80;
    listen 443 ssl http2;
    server_name forum.inst.lk;
    root /www/wwwroot/forum.inst.lk;

    include /www/server/panel/vhost/nginx/extension/forum.inst.lk/*.conf;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/forum.inst.lk.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/forum.inst.lk/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/forum.inst.lk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;
    #SSL-END

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ============================================
    # API Backend (Fastify on port 4000)
    # ============================================
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 25m;
    }

    # ============================================
    # Socket.IO (WebSocket on port 4001)
    # ============================================
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ============================================
    # Uploaded files (static serve)
    # ============================================
    location /uploads/ {
        alias /www/wwwroot/forum.inst.lk/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Only allow images
        location ~ \.(webp|jpg|jpeg|png|gif)$ {
            try_files $uri =404;
        }
        # Block everything else in uploads
        location ~ \.(?!webp|jpg|jpeg|png|gif).+$ {
            return 403;
        }
    }

    # ============================================
    # Next.js Static Assets (_next/static)
    # ============================================
    location /_next/static/ {
        alias /www/wwwroot/forum.inst.lk/apps/web/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # Next.js Public Assets
    # ============================================
    location /default-avatar.svg {
        alias /www/wwwroot/forum.inst.lk/apps/web/public/default-avatar.svg;
        expires 30d;
        access_log off;
    }

    # ============================================
    # Health Check
    # ============================================
    location /health {
        proxy_pass http://127.0.0.1:4000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ============================================
    # Next.js Frontend (everything else)
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # ============================================
    # Block sensitive files
    # ============================================
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md) {
        return 404;
    }

    location ~ /node_modules/ {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    access_log /www/wwwlogs/forum.inst.lk.log;
    error_log /www/wwwlogs/forum.inst.lk.error.log;
}
